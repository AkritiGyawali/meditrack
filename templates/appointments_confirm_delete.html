{% extends "_base.html" %}
{% block title %}Delete Appointment — Meditrack{% endblock %}
{% block content %}
<h1 class="page-title">Delete Appointment</h1>
<div class="form-card">
    <p>Are you sure you want to delete this appointment for <strong>{{ object.patient_name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-primary">Yes, Delete</button>
        <a href="{% url 'appointments' %}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
