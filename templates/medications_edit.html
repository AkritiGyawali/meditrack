{% extends "_base.html" %}
{% block title %}Edit Medication — Meditrack{% endblock %}
{% block content %}
<h1 class="page-title">Edit Medication</h1>
<form class="form-card" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Update Medication</button>
    <a href="{% url 'medications' %}" class="btn-secondary">Cancel</a>
</form>
{% endblock %}
