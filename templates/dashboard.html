{% extends "_base.html" %}

{% block title %}Dashboard — Meditrack{% endblock title %}

{% block content %}
<h1 class="page-title">Dashboard</h1>
<form class="form-card" method="post" action="">
    {% csrf_token %}
    <div class="form-group">
        <label for="user_name">User name</label>
        <input type="text" id="user_name" name="user_name" autocomplete="name" required>
    </div>
    <div class="form-group">
        <label for="user_address">User address</label>
        <textarea id="user_address" name="user_address" rows="3" autocomplete="street-address"></textarea>
    </div>
    <div class="form-group">
        <label for="user_phone">User phone number</label>
        <input type="tel" id="user_phone" name="user_phone" autocomplete="tel">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn-primary">Save</button>
    </div>
</form>
{% endblock content %}
