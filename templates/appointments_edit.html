{% extends "_base.html" %}
{% block title %}Edit Appointment — Meditrack{% endblock %}
{% block content %}
<h1 class="page-title">Edit Appointment</h1>
<form class="form-card" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Update Appointment</button>
    <a href="{% url 'appointments' %}" class="btn-secondary">Cancel</a>
</form>
{% endblock %}
